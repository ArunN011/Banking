<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | Stackly</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, Arial, sans-serif;
}

body{
  height:100vh;
  background:linear-gradient(135deg,#0f172a,#111827);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* Container */
.error-container{
  max-width:600px;
  padding:40px;
  animation:fadeIn 1s ease forwards;
}

/* Big 404 */
.error-code{
  font-size:120px;
  font-weight:800;
  background:linear-gradient(45deg,#22c55e,#4ade80);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* Title */
.error-title{
  font-size:28px;
  margin-top:10px;
  font-weight:600;
}

/* Description */
.error-text{
  margin-top:15px;
  color:#cbd5e1;
  line-height:1.6;
}

/* Button */
.home-btn{
  margin-top:30px;
  display:inline-block;
  padding:14px 28px;
  background:#22c55e;
  color:#000;
  font-weight:600;
  border-radius:10px;
  text-decoration:none;
  transition:0.3s;
}

.home-btn:hover{
  background:#4ade80;
  transform:translateY(-3px);
}

/* Floating Icon */
.floating{
  position:absolute;
  top:20%;
  right:15%;
  font-size:40px;
  animation:float 3s ease-in-out infinite;
  opacity:0.2;
}

/* Animations */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
  100%{transform:translateY(0);}
}

/* Responsive */
@media(max-width:600px){

  .error-code{
    font-size:80px;
  }

  .error-title{
    font-size:22px;
  }

  .error-text{
    font-size:14px;
  }

}

</style>
</head>
<body>

<div class="floating">💳</div>

<div class="error-container">

  <div class="error-code">404</div>

  <div class="error-title">
    Oops! Page Not Found
  </div>

  <p class="error-text">
    The page you are looking for might have been removed, 
    had its name changed, or is temporarily unavailable.
  </p>

  <a href="index.html" class="home-btn">
    Back To Home
  </a>

</div>

</body>
</html>
