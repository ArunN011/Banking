<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stackly Premium Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

/* ===== BODY ===== */
body{
  background:#0B1C2D;
  color:#F1F5F9;
}

/* ===== LAYOUT ===== */
.dashboard{
  display:flex;
  min-height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:240px;
  background:#071426;
  padding:25px 15px;
  transition:0.3s;
}

.logo{
  font-size:22px;
  font-weight:600;
  color:#22C55E;
  margin-bottom:30px;
}

/* MENU */
.sidebar-menu{
  list-style:none;
}

.sidebar-menu li{
  margin-bottom:8px;
  border-radius:10px;
}

.sidebar-menu li a{
  display:block;
  padding:12px 18px;
  text-decoration:none;
  color:#F1F5F9;
  font-size:15px;
  border-radius:10px;
  transition:0.3s;
}

/* Hover */
.sidebar-menu li:hover{
  background:rgba(255,255,255,0.05);
}

/* Active */
.sidebar-menu .active{
  background:#22C55E;
}

.sidebar-menu .active a{
  color:#000;
  font-weight:600;
}

/* Go Back */
.sidebar-menu .go-back a{
  color:#94A3B8;
  font-size:14px;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  padding:30px;
}

/* ===== TOPBAR ===== */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.menu-toggle{
  font-size:24px;
  cursor:pointer;
  display:none;
}

/* ===== CARDS ===== */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:30px;
}

.stat-card{
  background:#1F2D44;
  padding:25px;
  border-radius:16px;
  transition:0.3s;
}

.stat-card:hover{
  transform:translateY(-5px);
}

.stat-card h4{
  font-size:14px;
  color:#94A3B8;
}

.stat-card h2{
  margin-top:10px;
}

/* ===== CHART BOX ===== */
.chart-box{
  background:#1F2D44;
  padding:25px;
  border-radius:20px;
  margin-bottom:25px;
}

.chart-container{
  position:relative;
  height:300px;
}

canvas{
  width:100%!important;
  height:100%!important;
}

.grid-two{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:900;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}

/* ===== RESPONSIVE ===== */
@media(max-width:1100px){
  .stats{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:900px){

  .sidebar{
    position:fixed;
    left:-260px;
    top:0;
    height:100%;
    z-index:1000;
  }

  .sidebar.active{
    left:0;
  }

  .menu-toggle{
    display:block;
  }

  .stats{
    grid-template-columns:1fr;
  }

  .grid-two{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">Stackly</div>

    <ul class="sidebar-menu">
      <li class="active"><a href="404.html">Dashboard</a></li>
      <li><a href="404.html">Accounts</a></li>
      <li><a href="404.html">Transfers</a></li>
      <li><a href="404.html">Transactions</a></li>
      <li><a href="404.html">Loans</a></li>
      <li><a href="404.html">Cards</a></li>
      <li><a href="404.html">Settings</a></li>
      <li class="go-back"><a href="javascript:history.back()">⬅ Go Back</a></li>
    </ul>
  </aside>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <div class="menu-toggle" onclick="toggleMenu()">
        <span id="menuIcon">☰</span>
      </div>
      <h2>Banking Overview</h2>
    </div>

    <!-- CARDS -->
    <div class="stats">
      <div class="stat-card">
        <h4>Total Balance</h4>
        <h2>$84,250</h2>
      </div>
      <div class="stat-card">
        <h4>Income</h4>
        <h2>$18,420</h2>
      </div>
      <div class="stat-card">
        <h4>Expenses</h4>
        <h2>$9,870</h2>
      </div>
      <div class="stat-card">
        <h4>Investments</h4>
        <h2>$12,600</h2>
      </div>
    </div>

    <!-- LINE CHART -->
    <div class="chart-box">
      <h3>Transaction Analytics</h3>
      <div class="chart-container">
        <canvas id="lineChart"></canvas>
      </div>
    </div>

    <!-- TWO CHARTS -->
    <div class="grid-two">
      <div class="chart-box">
        <h3>Income vs Expense</h3>
        <div class="chart-container">
          <canvas id="barChart"></canvas>
        </div>
      </div>

      <div class="chart-box">
        <h3>Spending Categories</h3>
        <div class="chart-container">
          <canvas id="doughnutChart"></canvas>
        </div>
      </div>
    </div>

  </main>
</div>

<script>

/* SIDEBAR TOGGLE */
function toggleMenu(){
  const sidebar=document.getElementById("sidebar");
  const overlay=document.getElementById("overlay");
  const icon=document.getElementById("menuIcon");

  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");

  icon.innerHTML=sidebar.classList.contains("active")?"✖":"☰";
}

/* LINE CHART */
new Chart(document.getElementById("lineChart"),{
  type:'line',
  data:{
    labels:['Jan','Feb','Mar','Apr','May','Jun','Jul'],
    datasets:[{
      label:'Transactions',
      data:[5000,7000,6500,8000,9000,8500,10000],
      borderColor:'#22C55E',
      backgroundColor:'rgba(34,197,94,0.2)',
      fill:true,
      tension:0.4
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#F1F5F9'}}},
    scales:{
      x:{ticks:{color:'#F1F5F9'}},
      y:{ticks:{color:'#F1F5F9'}}
    }
  }
});

/* BAR CHART */
new Chart(document.getElementById("barChart"),{
  type:'bar',
  data:{
    labels:['Jan','Feb','Mar','Apr','May'],
    datasets:[
      {label:'Income',data:[8000,9000,8500,9500,10000],backgroundColor:'#22C55E'},
      {label:'Expense',data:[4000,5000,4500,6000,6500],backgroundColor:'#EF4444'}
    ]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#F1F5F9'}}},
    scales:{
      x:{ticks:{color:'#F1F5F9'}},
      y:{ticks:{color:'#F1F5F9'}}
    }
  }
});

/* DOUGHNUT */
new Chart(document.getElementById("doughnutChart"),{
  type:'doughnut',
  data:{
    labels:['Shopping','Bills','Travel','Food','Other'],
    datasets:[{
      data:[30,20,15,25,10],
      backgroundColor:['#22C55E','#3B82F6','#F59E0B','#EC4899','#8B5CF6']
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#F1F5F9'}}}
  }
});

</script>

</body>
</html>
